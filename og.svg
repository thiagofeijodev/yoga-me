<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#fef9f0"/>
      <stop offset="55%"  stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative soft circles -->
  <circle cx="950" cy="315" r="310" fill="#4ade80" fill-opacity="0.07"/>
  <circle cx="950" cy="315" r="210" fill="#4ade80" fill-opacity="0.07"/>
  <circle cx="950" cy="315" r="120" fill="#4ade80" fill-opacity="0.05"/>

  <!-- ── LEFT: branding ─────────────────────────────────────────────── -->

  <!-- Leaf icon -->
  <text x="72" y="168" font-size="64" font-family="system-ui, sans-serif">🌿</text>

  <!-- Title -->
  <text x="72" y="300" font-size="116" fill="#14532d" letter-spacing="-3" font-weight="400">Yoga Me</text>

  <!-- Tagline -->
  <text x="76" y="366" font-size="34" fill="#6b7280" font-family="system-ui, sans-serif" font-weight="400" letter-spacing="0.3">Move well, feel better.</text>

  <!-- Category pills -->
  <!-- Yoga -->
  <rect x="76"  y="418" width="122" height="42" rx="21" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
  <text x="137" y="445" font-size="19" fill="#15803d" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Yoga</text>

  <!-- Stretching -->
  <rect x="210" y="418" width="168" height="42" rx="21" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="294" y="445" font-size="19" fill="#0369a1" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Stretching</text>

  <!-- Rehab -->
  <rect x="390" y="418" width="112" height="42" rx="21" fill="#fef3c7" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="446" y="445" font-size="19" fill="#b45309" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Rehab</text>

  <!-- Physiotherapy -->
  <rect x="514" y="418" width="210" height="42" rx="21" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="619" y="445" font-size="19" fill="#7c3aed" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Physiotherapy</text>

  <!-- ── RIGHT: four figures ────────────────────────────────────────── -->
  <!--
    Each figure lives in a 100×130 logical space.
    Scale = 1.72, so rendered size ≈ 172 × 224 px.
    Grid: 2 columns × 2 rows, starting at x=790, y=60
    col gap = 200, row gap = 250
  -->

  <!-- ── Figure 1: Warrior I (Yoga, green) — top-left of grid ── -->
  <!-- offset x=790, y=60, scale=1.72 -->
  <!-- Legs -->
  <line x1="862" y1="160" x2="850" y2="214" stroke="#15803d" stroke-width="19" stroke-linecap="round"/>
  <line x1="850" y1="214" x2="839" y2="251" stroke="#15803d" stroke-width="14" stroke-linecap="round"/>
  <line x1="890" y1="160" x2="900" y2="207" stroke="#15803d" stroke-width="19" stroke-linecap="round"/>
  <line x1="900" y1="207" x2="910" y2="245" stroke="#15803d" stroke-width="14" stroke-linecap="round"/>
  <!-- Pelvis bar -->
  <line x1="862" y1="160" x2="890" y2="160" stroke="#15803d" stroke-width="17" stroke-linecap="round"/>
  <!-- Torso fill -->
  <polygon points="858,118 877,118 892,160 863,160" fill="#dcfce7" stroke="#15803d" stroke-width="2" stroke-linejoin="round"/>
  <!-- Torso sides -->
  <line x1="858" y1="118" x2="863" y2="160" stroke="#15803d" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="877" y1="118" x2="892" y2="160" stroke="#15803d" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- Shoulders -->
  <line x1="851" y1="105" x2="884" y2="105" stroke="#15803d" stroke-width="16" stroke-linecap="round"/>
  <!-- Arms up -->
  <line x1="851" y1="105" x2="848" y2="80"  stroke="#15803d" stroke-width="14" stroke-linecap="round"/>
  <line x1="848" y1="80"  x2="847" y2="61"  stroke="#15803d" stroke-width="10" stroke-linecap="round"/>
  <line x1="884" y1="105" x2="887" y2="80"  stroke="#15803d" stroke-width="14" stroke-linecap="round"/>
  <line x1="887" y1="80"  x2="888" y2="61"  stroke="#15803d" stroke-width="10" stroke-linecap="round"/>
  <!-- Joints -->
  <circle cx="848" cy="80"  r="6" fill="white" stroke="#15803d" stroke-width="3"/>
  <circle cx="887" cy="80"  r="6" fill="white" stroke="#15803d" stroke-width="3"/>
  <circle cx="850" cy="214" r="6" fill="white" stroke="#15803d" stroke-width="3"/>
  <circle cx="900" cy="207" r="6" fill="white" stroke="#15803d" stroke-width="3"/>
  <!-- Head -->
  <circle cx="868" cy="91" r="14" fill="#15803d"/>
  <circle cx="871" cy="89" r="2.5" fill="white" fill-opacity="0.7"/>

  <!-- ── Figure 2: Side Stretch (Stretching, blue) — top-right ── -->
  <!-- offset x=990, y=65 -->
  <!-- Legs straight -->
  <line x1="1052" y1="161" x2="1052" y2="214" stroke="#0369a1" stroke-width="19" stroke-linecap="round"/>
  <line x1="1052" y1="214" x2="1052" y2="251" stroke="#0369a1" stroke-width="14" stroke-linecap="round"/>
  <line x1="1080" y1="161" x2="1080" y2="214" stroke="#0369a1" stroke-width="19" stroke-linecap="round"/>
  <line x1="1080" y1="214" x2="1080" y2="251" stroke="#0369a1" stroke-width="14" stroke-linecap="round"/>
  <!-- Pelvis bar -->
  <line x1="1052" y1="161" x2="1080" y2="161" stroke="#0369a1" stroke-width="17" stroke-linecap="round"/>
  <!-- Torso (tilted) -->
  <polygon points="1050,118 1068,118 1083,161 1053,161" fill="#e0f2fe" stroke="#0369a1" stroke-width="2" stroke-linejoin="round"/>
  <line x1="1050" y1="118" x2="1053" y2="161" stroke="#0369a1" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="1068" y1="118" x2="1083" y2="161" stroke="#0369a1" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- Shoulders wide -->
  <line x1="1035" y1="108" x2="1082" y2="108" stroke="#0369a1" stroke-width="16" stroke-linecap="round"/>
  <!-- Left arm down -->
  <line x1="1035" y1="108" x2="1030" y2="140" stroke="#0369a1" stroke-width="14" stroke-linecap="round"/>
  <line x1="1030" y1="140" x2="1027" y2="158" stroke="#0369a1" stroke-width="10" stroke-linecap="round"/>
  <!-- Right arm up and over -->
  <line x1="1082" y1="108" x2="1088" y2="80"  stroke="#0369a1" stroke-width="14" stroke-linecap="round"/>
  <line x1="1088" y1="80"  x2="1092" y2="62"  stroke="#0369a1" stroke-width="10" stroke-linecap="round"/>
  <!-- Joints -->
  <circle cx="1030" cy="140" r="6" fill="white" stroke="#0369a1" stroke-width="3"/>
  <circle cx="1088" cy="80"  r="6" fill="white" stroke="#0369a1" stroke-width="3"/>
  <circle cx="1052" cy="214" r="6" fill="white" stroke="#0369a1" stroke-width="3"/>
  <circle cx="1080" cy="214" r="6" fill="white" stroke="#0369a1" stroke-width="3"/>
  <!-- Head (slightly tilted right) -->
  <circle cx="1068" cy="95" r="14" fill="#0369a1"/>
  <circle cx="1071" cy="93" r="2.5" fill="white" fill-opacity="0.7"/>

  <!-- ── Figure 3: Glute Bridge (Rehab, amber) — bottom-left ── -->
  <!-- offset x=790, y=320 — supine/bridge pose -->
  <!-- Torso near horizontal with hips raised -->
  <!-- Head on left -->
  <circle cx="813" cy="428" r="14" fill="#b45309"/>
  <circle cx="816" cy="426" r="2.5" fill="white" fill-opacity="0.7"/>
  <!-- Neck/upper torso going right and slightly up -->
  <line x1="820" y1="428" x2="848" y2="418" stroke="#b45309" stroke-width="16" stroke-linecap="round"/>
  <!-- Torso fill -->
  <polygon points="845,408 868,408 875,435 852,435" fill="#fef3c7" stroke="#b45309" stroke-width="2" stroke-linejoin="round"/>
  <line x1="845" y1="408" x2="852" y2="435" stroke="#b45309" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="868" y1="408" x2="875" y2="435" stroke="#b45309" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- Arms on ground -->
  <line x1="845" y1="408" x2="828" y2="420" stroke="#b45309" stroke-width="14" stroke-linecap="round"/>
  <line x1="828" y1="420" x2="820" y2="434" stroke="#b45309" stroke-width="10" stroke-linecap="round"/>
  <line x1="868" y1="408" x2="878" y2="420" stroke="#b45309" stroke-width="14" stroke-linecap="round"/>
  <line x1="878" y1="420" x2="886" y2="434" stroke="#b45309" stroke-width="10" stroke-linecap="round"/>
  <!-- Hips raised, pelvis bar -->
  <line x1="852" y1="435" x2="875" y2="435" stroke="#b45309" stroke-width="17" stroke-linecap="round"/>
  <!-- Bent knees going down to feet -->
  <line x1="852" y1="435" x2="842" y2="468" stroke="#b45309" stroke-width="19" stroke-linecap="round"/>
  <line x1="842" y1="468" x2="840" y2="490" stroke="#b45309" stroke-width="14" stroke-linecap="round"/>
  <line x1="875" y1="435" x2="882" y2="468" stroke="#b45309" stroke-width="19" stroke-linecap="round"/>
  <line x1="882" y1="468" x2="884" y2="490" stroke="#b45309" stroke-width="14" stroke-linecap="round"/>
  <!-- Joints -->
  <circle cx="828" cy="420" r="6" fill="white" stroke="#b45309" stroke-width="3"/>
  <circle cx="878" cy="420" r="6" fill="white" stroke="#b45309" stroke-width="3"/>
  <circle cx="842" cy="468" r="6" fill="white" stroke="#b45309" stroke-width="3"/>
  <circle cx="882" cy="468" r="6" fill="white" stroke="#b45309" stroke-width="3"/>

  <!-- ── Figure 4: Standing (Physiotherapy, purple) — bottom-right ── -->
  <!-- offset x=990, y=310 — standing upright with chin tuck -->
  <!-- Legs -->
  <line x1="1052" y1="451" x2="1052" y2="504" stroke="#7c3aed" stroke-width="19" stroke-linecap="round"/>
  <line x1="1052" y1="504" x2="1052" y2="540" stroke="#7c3aed" stroke-width="14" stroke-linecap="round"/>
  <line x1="1080" y1="451" x2="1080" y2="504" stroke="#7c3aed" stroke-width="19" stroke-linecap="round"/>
  <line x1="1080" y1="504" x2="1080" y2="540" stroke="#7c3aed" stroke-width="14" stroke-linecap="round"/>
  <!-- Pelvis bar -->
  <line x1="1052" y1="451" x2="1080" y2="451" stroke="#7c3aed" stroke-width="17" stroke-linecap="round"/>
  <!-- Torso -->
  <polygon points="1050,408 1068,408 1083,451 1053,451" fill="#ede9fe" stroke="#7c3aed" stroke-width="2" stroke-linejoin="round"/>
  <line x1="1050" y1="408" x2="1053" y2="451" stroke="#7c3aed" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="1068" y1="408" x2="1083" y2="451" stroke="#7c3aed" stroke-width="10" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- Shoulders -->
  <line x1="1040" y1="398" x2="1078" y2="398" stroke="#7c3aed" stroke-width="16" stroke-linecap="round"/>
  <!-- Arms down -->
  <line x1="1040" y1="398" x2="1036" y2="428" stroke="#7c3aed" stroke-width="14" stroke-linecap="round"/>
  <line x1="1036" y1="428" x2="1034" y2="450" stroke="#7c3aed" stroke-width="10" stroke-linecap="round"/>
  <line x1="1078" y1="398" x2="1082" y2="428" stroke="#7c3aed" stroke-width="14" stroke-linecap="round"/>
  <line x1="1082" y1="428" x2="1084" y2="450" stroke="#7c3aed" stroke-width="10" stroke-linecap="round"/>
  <!-- Joints -->
  <circle cx="1036" cy="428" r="6" fill="white" stroke="#7c3aed" stroke-width="3"/>
  <circle cx="1082" cy="428" r="6" fill="white" stroke="#7c3aed" stroke-width="3"/>
  <circle cx="1052" cy="504" r="6" fill="white" stroke="#7c3aed" stroke-width="3"/>
  <circle cx="1080" cy="504" r="6" fill="white" stroke="#7c3aed" stroke-width="3"/>
  <!-- Head (chin slightly tucked) -->
  <circle cx="1063" cy="383" r="14" fill="#7c3aed"/>
  <circle cx="1066" cy="381" r="2.5" fill="white" fill-opacity="0.7"/>

  <!-- Divider line between left and right -->
  <line x1="760" y1="60" x2="760" y2="570" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Figure labels at bottom -->
  <text x="868" y="280" font-size="16" fill="#15803d" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Yoga</text>
  <text x="1066" y="280" font-size="16" fill="#0369a1" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Stretching</text>
  <text x="860"  y="555" font-size="16" fill="#b45309" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Rehab</text>
  <text x="1066" y="570" font-size="16" fill="#7c3aed" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">Physiotherapy</text>

</svg>
